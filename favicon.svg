      .bracket { fill: #ffffff; }
    }
  </style>
  <text class="bracket" x="18" y="65" font-size="52" font-family="Montserrat, system-ui, sans-serif" text-anchor="middle">&lt;</text>
  <text class="letter" x="50" y="65" font-size="56" font-family="Montserrat, system-ui, sans-serif" text-anchor="middle">F</text>
  <text class="bracket" x="82" y="65" font-size="52" font-family="Montserrat, system-ui, sans-serif" text-anchor="middle">/&gt;</text>
</svg>
